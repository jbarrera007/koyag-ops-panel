<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de operaciones — Koyag</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

  <!-- LOGIN -->
  <div id="view-login" class="hidden flex items-center justify-center min-h-screen">
    <div class="bg-white rounded-2xl shadow-lg p-10 flex flex-col items-center gap-6 w-full max-w-sm">
      <h1 class="text-2xl font-bold text-gray-800 text-center">Panel de operaciones<br/><span class="text-indigo-600">Koyag</span></h1>
      <a href="/auth/google"
         class="flex items-center gap-3 bg-white border border-gray-300 rounded-lg px-5 py-3 shadow-sm hover:shadow-md transition text-gray-700 font-medium">
        <svg class="w-5 h-5" viewBox="0 0 48 48"><path fill="#4285F4" d="M45.45 24.5c0-1.57-.14-3.08-.4-4.55H24v8.6h11.97c-.52 2.75-2.08 5.08-4.43 6.64v5.52h7.17c4.19-3.86 6.74-9.55 6.74-16.21z"/><path fill="#34A853" d="M24 46c6.02 0 11.07-2 14.76-5.42l-7.17-5.52c-2 1.34-4.55 2.13-7.59 2.13-5.84 0-10.79-3.94-12.56-9.24H4.09v5.7C7.77 41.19 15.33 46 24 46z"/><path fill="#FBBC05" d="M11.44 27.95A13.57 13.57 0 0 1 10.5 24c0-1.38.24-2.72.64-3.95v-5.7H4.09A22 22 0 0 0 2 24c0 3.55.85 6.91 2.09 9.65l7.35-5.7z"/><path fill="#EA4335" d="M24 10.75c3.29 0 6.24 1.13 8.56 3.35l6.41-6.41C34.74 4.18 29.76 2 24 2 15.33 2 7.77 6.81 4.09 14.35l7.35 5.7C13.21 14.69 18.16 10.75 24 10.75z"/></svg>
        Entrar con Google
      </a>
    </div>
  </div>

  <!-- APP PRINCIPAL -->
  <div id="view-app" class="hidden flex flex-col min-h-screen">

    <!-- Header -->
    <header class="bg-indigo-700 text-white px-6 py-4 flex items-center justify-between shadow">
      <h1 class="text-lg font-bold tracking-tight">Panel de operaciones — Koyag</h1>
      <div class="flex items-center gap-4">
        <span id="user-email" class="text-sm text-indigo-200"></span>
        <a href="/auth/logout" class="text-sm bg-indigo-900 hover:bg-indigo-800 px-3 py-1.5 rounded-lg transition">Cerrar sesión</a>
      </div>
    </header>

    <!-- Contenido -->
    <main class="flex-1 p-6 max-w-3xl mx-auto w-full">

      <!-- Selector de plataforma -->
      <div class="flex gap-2 mb-5">
        <button id="tab-comunidades" onclick="selectTab('comunidades')"
          class="px-5 py-2 rounded-lg font-semibold text-sm transition border border-indigo-600 bg-indigo-600 text-white">
          Comunidades
        </button>
        <button id="tab-nexo" disabled title="Próximamente"
          class="px-5 py-2 rounded-lg font-semibold text-sm border border-gray-200 text-gray-400 bg-gray-50 cursor-not-allowed">
          Nexo
        </button>
      </div>

      <!-- Error general -->
      <div id="error-banner" class="hidden bg-red-50 border border-red-300 text-red-700 rounded-lg px-4 py-3 mb-4 text-sm"></div>

      <!-- ── SECCIÓN COMUNIDADES ─────────────────────────────────── -->
      <div id="section-comunidades">

        <!-- Buscador de eventos -->
        <div class="mb-3">
          <input id="eventos-filter" type="text" placeholder="Buscar evento por nombre..."
            oninput="filtrarEventos()"
            class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        </div>

        <!-- Tabla de eventos -->
        <div class="bg-white rounded-2xl shadow overflow-hidden mb-6">
          <table class="w-full text-sm">
            <thead>
              <tr class="border-b border-gray-100 bg-gray-50">
                <th onclick="sortTabla('nombre')"
                  class="text-left px-4 py-3 text-xs font-semibold uppercase tracking-wide text-gray-500 cursor-pointer select-none hover:text-indigo-600 transition w-2/3">
                  <span class="flex items-center gap-1">Evento <span id="sort-icon-nombre" class="text-gray-300">↕</span></span>
                </th>
                <th onclick="sortTabla('fechaInicio')"
                  class="text-left px-4 py-3 text-xs font-semibold uppercase tracking-wide text-gray-500 cursor-pointer select-none hover:text-indigo-600 transition w-1/3">
                  <span class="flex items-center gap-1">Fecha inicio <span id="sort-icon-fechaInicio" class="text-gray-300">↕</span></span>
                </th>
              </tr>
            </thead>
            <tbody id="eventos-tbody">
              <tr><td colspan="2" class="px-4 py-4 text-sm text-gray-400">Cargando eventos...</td></tr>
            </tbody>
          </table>
        </div>

        <!-- Inscriptos del evento seleccionado -->
        <div id="inscriptos-section" class="hidden">
          <div class="flex items-center justify-between mb-3">
            <h3 id="inscriptos-titulo" class="text-sm font-semibold text-gray-700"></h3>
          </div>
          <div class="mb-3">
            <input id="inscriptos-filter" type="text" placeholder="Filtrar por nombre o email..."
              oninput="filtrarInscriptos()"
              class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>
          <div id="inscriptos-list" class="space-y-2"></div>
        </div>

      </div>

      <!-- ── SECCIÓN NEXO (oculta) ───────────────────────────────── -->
      <div id="section-nexo" class="hidden">
        <div class="flex gap-2 mb-4">
          <input id="search-input" type="text" placeholder="Buscar por nombre o email..."
            class="flex-1 border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
            onkeydown="if(event.key==='Enter') buscar()" />
          <button onclick="buscar()"
            class="bg-indigo-600 text-white px-5 py-2 rounded-lg text-sm font-semibold hover:bg-indigo-700 transition">
            Buscar
          </button>
        </div>
        <div id="results-list" class="space-y-2 mb-6"></div>
        <div id="user-card" class="hidden bg-white rounded-2xl shadow p-6"></div>
      </div>

    </main>
  </div>

  <!-- MODAL CONFIRMACIÓN -->
  <div id="modal-confirm" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl shadow-xl p-7 w-full max-w-sm mx-4">
      <h2 class="text-lg font-bold text-gray-800 mb-2">Confirmar acción</h2>
      <p id="modal-confirm-text" class="text-gray-600 text-sm mb-6"></p>
      <div class="flex justify-end gap-3">
        <button onclick="closeModal('modal-confirm')"
          class="px-4 py-2 rounded-lg border border-gray-300 text-gray-700 text-sm hover:bg-gray-50 transition">
          Cancelar
        </button>
        <button id="modal-confirm-btn" onclick="executeConfirmed()"
          class="px-4 py-2 rounded-lg bg-red-600 text-white text-sm font-semibold transition disabled:opacity-40 disabled:cursor-not-allowed">
          Confirmar
        </button>
      </div>
    </div>
  </div>

  <!-- MODAL EDITAR -->
  <div id="modal-edit" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl shadow-xl p-7 w-full max-w-sm mx-4">
      <h2 class="text-lg font-bold text-gray-800 mb-4">Editar usuario</h2>
      <form id="edit-form" class="space-y-3" onsubmit="submitEdit(event)">
        <div>
          <label class="text-xs font-medium text-gray-500 uppercase tracking-wide">Nombre</label>
          <input id="edit-nombre" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm mt-1 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        </div>
        <div>
          <label class="text-xs font-medium text-gray-500 uppercase tracking-wide">Apellido</label>
          <input id="edit-apellido" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm mt-1 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        </div>
        <div>
          <label class="text-xs font-medium text-gray-500 uppercase tracking-wide">Email</label>
          <input id="edit-email" type="email" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm mt-1 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        </div>
        <div>
          <label class="text-xs font-medium text-gray-500 uppercase tracking-wide">Teléfono</label>
          <input id="edit-telefono" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm mt-1 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        </div>
        <div class="flex justify-end gap-3 pt-2">
          <button type="button" onclick="closeModal('modal-edit')"
            class="px-4 py-2 rounded-lg border border-gray-300 text-gray-700 text-sm hover:bg-gray-50 transition">
            Cancelar
          </button>
          <button type="submit"
            class="px-4 py-2 rounded-lg bg-indigo-600 text-white text-sm font-semibold hover:bg-indigo-700 transition">
            Guardar
          </button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // ── Estado global ──────────────────────────────────────────────
    let currentTab        = 'comunidades';
    let currentUser       = null;
    let pendingAction     = null;
    let allEventos        = [];
    let sortCol           = 'nombre';
    let sortDir           = 'asc';
    let selectedEventoId  = null;
    let allInscriptos     = [];

    // ── Init ───────────────────────────────────────────────────────
    async function init() {
      try {
        const res = await fetch('/auth/me');
        if (!res.ok) throw new Error('no-auth');
        const user = await res.json();
        document.getElementById('user-email').textContent = user.email;
        show('view-app');
        selectTab('comunidades');
      } catch {
        show('view-login');
      }
    }

    function show(id) {
      document.getElementById('view-login').classList.add('hidden');
      document.getElementById('view-app').classList.add('hidden');
      document.getElementById(id).classList.remove('hidden');
    }

    // ── Tabs ───────────────────────────────────────────────────────
    function selectTab(tab) {
      currentTab = tab;
      currentUser = null;
      allInscriptos = [];
      selectedEventoId = null;
      clearError();

      document.getElementById('section-comunidades').classList.toggle('hidden', tab !== 'comunidades');
      document.getElementById('section-nexo').classList.toggle('hidden', tab !== 'nexo');

      if (tab === 'comunidades') loadEventos();
    }

    // ── Comunidades: tabla de eventos ──────────────────────────────
    async function loadEventos() {
      document.getElementById('eventos-tbody').innerHTML =
        '<tr><td colspan="2" class="px-4 py-4 text-sm text-gray-400">Cargando eventos...</td></tr>';
      document.getElementById('inscriptos-section').classList.add('hidden');
      document.getElementById('eventos-filter').value = '';
      allEventos = [];
      try {
        const res  = await fetch('/api/comunidades/eventos');
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error al cargar eventos');
        allEventos = data;
        renderTablaEventos(sortEventos(allEventos));
      } catch (err) {
        showError(err.message);
        document.getElementById('eventos-tbody').innerHTML =
          '<tr><td colspan="2" class="px-4 py-4 text-sm text-red-500">Error al cargar eventos.</td></tr>';
      }
    }

    function sortEventos(lista) {
      return [...lista].sort((a, b) => {
        let va = a[sortCol] ?? '';
        let vb = b[sortCol] ?? '';
        if (sortCol === 'fechaInicio') {
          va = va ? new Date(va).getTime() : 0;
          vb = vb ? new Date(vb).getTime() : 0;
          return sortDir === 'asc' ? va - vb : vb - va;
        }
        return sortDir === 'asc'
          ? String(va).localeCompare(String(vb), 'es')
          : String(vb).localeCompare(String(va), 'es');
      });
    }

    function sortTabla(col) {
      if (sortCol === col) {
        sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        sortCol = col;
        sortDir = 'asc';
      }
      const q = document.getElementById('eventos-filter').value.toLowerCase().trim();
      const base = q
        ? allEventos.filter((e) => e.nombre.toLowerCase().includes(q))
        : allEventos;
      renderTablaEventos(sortEventos(base));
    }

    function filtrarEventos() {
      const q = document.getElementById('eventos-filter').value.toLowerCase().trim();
      const base = q ? allEventos.filter((e) => e.nombre.toLowerCase().includes(q)) : allEventos;
      renderTablaEventos(sortEventos(base));
    }

    function renderTablaEventos(lista) {
      // Actualizar íconos de ordenamiento
      ['nombre', 'fechaInicio'].forEach((col) => {
        const el = document.getElementById(`sort-icon-${col}`);
        if (col !== sortCol) { el.textContent = '↕'; el.className = 'text-gray-300'; return; }
        el.textContent = sortDir === 'asc' ? '↑' : '↓';
        el.className = 'text-indigo-500';
      });

      const tbody = document.getElementById('eventos-tbody');
      if (!lista.length) {
        tbody.innerHTML = '<tr><td colspan="2" class="px-4 py-4 text-sm text-gray-400">Sin eventos.</td></tr>';
        return;
      }
      tbody.innerHTML = lista.map((e) => {
        const selected = e.id === selectedEventoId;
        const rowClass = selected
          ? 'bg-indigo-50 border-l-2 border-indigo-500'
          : 'hover:bg-gray-50 border-l-2 border-transparent';
        return `
          <tr onclick="selectEvento(${e.id}, ${jsStr(e.nombre)})"
            class="${rowClass} cursor-pointer transition border-b border-gray-100 last:border-0">
            <td class="px-4 py-3 font-medium text-gray-800">${escHtml(e.nombre)}</td>
            <td class="px-4 py-3 text-gray-500">${fmtFecha(e.fechaInicio)}</td>
          </tr>`;
      }).join('');
    }

    async function selectEvento(eventoId, nombre) {
      selectedEventoId = eventoId;
      // Re-render tabla para marcar la fila seleccionada
      const q = document.getElementById('eventos-filter').value.toLowerCase().trim();
      const base = q ? allEventos.filter((e) => e.nombre.toLowerCase().includes(q)) : allEventos;
      renderTablaEventos(sortEventos(base));

      // Mostrar sección inscriptos
      const sec = document.getElementById('inscriptos-section');
      sec.classList.remove('hidden');
      document.getElementById('inscriptos-titulo').textContent = `Inscriptos: ${nombre}`;
      document.getElementById('inscriptos-filter').value = '';
      document.getElementById('inscriptos-list').innerHTML =
        '<p class="text-sm text-gray-400">Cargando inscriptos...</p>';
      allInscriptos = [];
      clearError();

      try {
        const res  = await fetch(`/api/comunidades/eventos/${eventoId}/inscriptos`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error al cargar inscriptos');
        allInscriptos = data;
        renderInscriptos(data);
      } catch (err) {
        showError(err.message);
        document.getElementById('inscriptos-list').innerHTML = '';
      }
    }

    // ── Comunidades: inscriptos ────────────────────────────────────
    function filtrarInscriptos() {
      const q = document.getElementById('inscriptos-filter').value.toLowerCase().trim();
      if (!q) { renderInscriptos(allInscriptos); return; }
      renderInscriptos(
        allInscriptos.filter((u) =>
          `${u.nombre} ${u.apellido}`.toLowerCase().includes(q) ||
          u.email.toLowerCase().includes(q)
        )
      );
    }

    function renderInscriptos(lista) {
      const el = document.getElementById('inscriptos-list');
      const total = allInscriptos.length;

      if (total === 0) {
        el.innerHTML = '<p class="text-sm text-gray-400">Este evento no tiene inscriptos.</p>';
        return;
      }

      const filtrado = lista.length !== total
        ? ` (mostrando ${lista.length} de ${total})`
        : '';

      const filas = lista.length === 0
        ? '<p class="text-sm text-gray-400">Sin resultados para ese filtro.</p>'
        : lista.map((u) => {
            const nombre = escHtml(`${u.nombre} ${u.apellido}`.trim() || '—');
            const email  = escHtml(u.email || '—');
            return `
              <div class="bg-white rounded-xl border border-gray-200 px-4 py-3 flex items-center justify-between gap-3">
                <div class="min-w-0">
                  <p class="font-medium text-gray-800 text-sm">${nombre}</p>
                  <p class="text-xs text-gray-500">${email}</p>
                </div>
                <div class="flex gap-2 shrink-0">
                  <button onclick="openEditFromInscripto(${jsStr(u.userId)},${jsStr(u.nombre)},${jsStr(u.apellido)},${jsStr(u.email)},${jsStr(u.telefono)})"
                    class="text-xs px-3 py-1.5 rounded-lg border border-gray-300 text-gray-600 hover:bg-gray-50 transition">
                    Editar
                  </button>
                  <button onclick="confirmAction(${jsStr('eliminar_inscripto')},${jsStr(u.userId)},${jsStr(u.inscripcionId)},${jsStr(`${u.nombre} ${u.apellido}`.trim())})"
                    class="text-xs px-3 py-1.5 rounded-lg border border-red-200 bg-red-50 text-red-600 hover:bg-red-100 transition">
                    Eliminar
                  </button>
                </div>
              </div>`;
          }).join('');

      el.innerHTML =
        `<p class="text-xs text-gray-400 mb-2">${total} inscripto${total !== 1 ? 's' : ''}${filtrado}</p>` +
        filas;
    }

    function openEditFromInscripto(userId, nombre, apellido, email, telefono) {
      currentUser = { id: userId, nombre, apellido, email, telefono };
      openEditModal();
    }

    // ── Nexo: búsqueda (sin uso por ahora) ────────────────────────
    async function buscar() {
      const q = document.getElementById('search-input').value.trim();
      if (!q) return;
      clearError();
      document.getElementById('results-list').innerHTML = '<p class="text-sm text-gray-400">Buscando...</p>';
      document.getElementById('user-card').classList.add('hidden');
      try {
        const res  = await fetch(`/api/${currentTab}/buscar?q=${encodeURIComponent(q)}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error al buscar');
        renderResults(data);
      } catch (err) {
        showError(err.message);
        document.getElementById('results-list').innerHTML = '';
      }
    }

    function renderResults(usuarios) {
      const list = document.getElementById('results-list');
      if (!usuarios.length) {
        list.innerHTML = '<p class="text-sm text-gray-400">Sin resultados.</p>';
        return;
      }
      list.innerHTML = usuarios.map((u) => `
        <button onclick="loadUser('${u.id}')"
          class="w-full text-left bg-white rounded-xl border border-gray-200 px-4 py-3 hover:border-indigo-400 hover:shadow-sm transition">
          <p class="font-medium text-gray-800 text-sm">${escHtml(u.nombre || '—')}</p>
          <p class="text-xs text-gray-500">${escHtml(u.email || '—')}</p>
        </button>
      `).join('');
    }

    async function loadUser(id) {
      clearError();
      const card = document.getElementById('user-card');
      card.innerHTML = '<p class="text-sm text-gray-400">Cargando...</p>';
      card.classList.remove('hidden');
      try {
        const res  = await fetch(`/api/${currentTab}/usuarios/${id}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error al cargar usuario');
        currentUser = data;
        renderUserCard(data);
      } catch (err) {
        showError(err.message);
        card.classList.add('hidden');
      }
    }

    function renderUserCard(u) {
      const card = document.getElementById('user-card');
      const infoHtml =
        `<p class="text-sm text-gray-600"><span class="font-medium">Nombre:</span> ${escHtml(u.nombre || '')} ${escHtml(u.apellido || '')}</p>
         <p class="text-sm text-gray-600"><span class="font-medium">Email:</span> ${escHtml(u.email || '')}</p>
         <p class="text-sm text-gray-600"><span class="font-medium">Teléfono:</span> ${escHtml(u.telefono || '—')}</p>`;

      const relacionesHtml = renderRelaciones('Espacios', u.espacios || [], (e) =>
        `<div class="flex items-center justify-between py-1">
           <span class="text-sm text-gray-700">${escHtml(e.nombre)}</span>
           <button onclick="confirmAction(${jsStr('eliminar_espacio')},${jsStr(u.id)},${jsStr(e.id)},${jsStr(e.nombre)})"
             class="text-xs text-red-500 hover:text-red-700 font-medium transition">Eliminar</button>
         </div>`);

      const eventosHtml = renderRelaciones('Eventos', u.eventos || [], (e) =>
        `<div class="flex items-center justify-between py-1">
           <span class="text-sm text-gray-700">${escHtml(e.nombre)}</span>
           <button onclick="confirmAction(${jsStr('eliminar_evento')},${jsStr(u.id)},${jsStr(e.id)},${jsStr(e.nombre)})"
             class="text-xs text-red-500 hover:text-red-700 font-medium transition">Eliminar</button>
         </div>`);

      card.innerHTML = `
        <div class="flex items-start justify-between mb-4">
          <div class="space-y-1">${infoHtml}</div>
        </div>
        <hr class="my-4 border-gray-100"/>
        ${relacionesHtml}
        ${eventosHtml}
      `;
    }

    function renderRelaciones(titulo, items, rowFn) {
      return `
        <div class="mb-4">
          <h3 class="text-xs font-semibold uppercase tracking-wide text-gray-400 mb-2">${titulo}</h3>
          ${items.length
            ? `<div class="divide-y divide-gray-100">${items.map(rowFn).join('')}</div>`
            : `<p class="text-sm text-gray-400">Sin ${titulo.toLowerCase()}.</p>`}
        </div>`;
    }

    // ── Modal confirmación ─────────────────────────────────────────
    function confirmAction(accion, usuarioId, relacionId, nombre) {
      const textos = {
        eliminar_inscripto: `¿Eliminar la inscripción de <strong>${escHtml(nombre)}</strong> de este evento?`,
        eliminar_espacio:   `¿Eliminar del espacio <strong>${escHtml(nombre)}</strong>?`,
        eliminar_evento:    `¿Eliminar del evento <strong>${escHtml(nombre)}</strong>?`,
      };
      pendingAction = { accion, usuarioId, relacionId };
      document.getElementById('modal-confirm-text').innerHTML = textos[accion] || '¿Confirmar acción?';
      const btn = document.getElementById('modal-confirm-btn');
      btn.disabled = true;
      setTimeout(() => { btn.disabled = false; }, 1500);
      document.getElementById('modal-confirm').classList.remove('hidden');
    }

    async function executeConfirmed() {
      if (!pendingAction) return;
      const { accion, usuarioId, relacionId } = pendingAction;
      closeModal('modal-confirm');

      let url;
      if (accion === 'eliminar_inscripto') url = `/api/comunidades/usuarios/${usuarioId}/evento/${relacionId}`;
      if (accion === 'eliminar_espacio')   url = `/api/nexo/usuarios/${usuarioId}/espacio/${relacionId}`;
      if (accion === 'eliminar_evento')    url = `/api/${currentTab}/usuarios/${usuarioId}/evento/${relacionId}`;

      try {
        const res  = await fetch(url, { method: 'DELETE' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error al ejecutar la acción');
        if (accion === 'eliminar_inscripto') {
          const titulo = document.getElementById('inscriptos-titulo').textContent.replace('Inscriptos: ', '');
          await selectEvento(selectedEventoId, titulo);
        } else {
          await loadUser(usuarioId);
        }
      } catch (err) {
        showError(err.message);
      } finally {
        pendingAction = null;
      }
    }

    // ── Modal editar ───────────────────────────────────────────────
    function openEditModal() {
      if (!currentUser) return;
      document.getElementById('edit-nombre').value   = currentUser.nombre   || '';
      document.getElementById('edit-apellido').value = currentUser.apellido || '';
      document.getElementById('edit-email').value    = currentUser.email    || '';
      document.getElementById('edit-telefono').value = currentUser.telefono || '';
      document.getElementById('modal-edit').classList.remove('hidden');
    }

    async function submitEdit(event) {
      event.preventDefault();
      const body = {
        nombre:   document.getElementById('edit-nombre').value,
        apellido: document.getElementById('edit-apellido').value,
        email:    document.getElementById('edit-email').value,
        telefono: document.getElementById('edit-telefono').value,
      };
      try {
        const res  = await fetch(`/api/comunidades/usuarios/${currentUser.id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error al guardar');
        closeModal('modal-edit');
        if (currentTab === 'comunidades' && selectedEventoId) {
          const titulo = document.getElementById('inscriptos-titulo').textContent.replace('Inscriptos: ', '');
          await selectEvento(selectedEventoId, titulo);
        } else {
          await loadUser(currentUser.id);
        }
      } catch (err) {
        showError(err.message);
      }
    }

    // ── Helpers ────────────────────────────────────────────────────
    function closeModal(id) {
      document.getElementById(id).classList.add('hidden');
    }

    function showError(msg) {
      const el = document.getElementById('error-banner');
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    function clearError() {
      document.getElementById('error-banner').classList.add('hidden');
    }

    function fmtFecha(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      if (isNaN(d)) return '—';
      return d.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    function jsStr(val) {
      return JSON.stringify(String(val == null ? '' : val));
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Arrancar ───────────────────────────────────────────────────
    init();
  </script>
</body>
</html>
